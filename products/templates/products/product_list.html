<h1 style="text-align:center;">🛒 NovaShop</h1>

<!-- 🔝 BARRA SUPERIOR -->
<div style="display:flex; justify-content:space-between; padding:10px; background:#222; color:white;">
    <div>🛍️ Tienda</div>
    <div>
        <a href="{% url 'cart_detail' %}" style="color:white; text-decoration:none;">
            🛒 ({{ cart_count }})
        </a>
    </div>
</div>

<style>
    .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        padding: 20px;
    }

    .card {
        border: 1px solid #ddd;
        border-radius: 10px;
        padding: 10px;
        text-align: center;
        transition: 0.3s;
        background: white;
    }

    .card:hover {
        transform: scale(1.05);
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 8px;
    }

    .price {
        font-weight: bold;
        color: #333;
    }

    button {
        background: #56b8c5;
        border: none;
        padding: 10px;
        width: 100%;
        margin-top: 10px;
        cursor: pointer;
        border-radius: 5px;
    }

    button:hover {
        background: #1d5c59;
    }
</style>

<div class="container">
    {% for product in products %}
        <div class="card">

            {% if product.image %}
                <img src="{{ product.image.url }}">
            {% endif %}

            <h3>{{ product.name }}</h3>
            <p class="price">$ {{ product.price }}</p>

            <a href="{% url 'add_to_cart' product.id %}">
                <button>🛒 Agregar al carrito</button>
            </a>

        </div>
    {% endfor %}
</div>
